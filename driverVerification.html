<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Verification – RideLink</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand"><div class="nav-brand-icon">R</div>RideLink</div>
</nav>

<div class="page-wrapper">
<div style="max-width:480px;margin:0 auto;padding:16px">

  <div class="page-header" style="padding:0 0 20px">
    <div class="back-btn" onclick="goBack()">←</div>
    <h1 class="page-title">Driver Verification</h1>
  </div>

  <!-- Status banner -->
  <div id="verified-banner" style="display:none" class="rl-card fade-in"
    style="background:rgba(63,185,80,0.1);border-color:rgba(63,185,80,0.3);margin-bottom:16px">
    <div style="display:flex;align-items:center;gap:10px;color:var(--success)">
      <span style="font-size:24px">✅</span>
      <div>
        <div style="font-weight:700">You are a Verified Driver</div>
        <div style="font-size:13px;opacity:0.8">Your account is verified and active</div>
      </div>
    </div>
  </div>

  <div id="verif-form" class="fade-in">
    <div class="rl-card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <span style="font-size:20px">🪪</span>
        <div>
          <div style="font-weight:600">Document Verification</div>
          <div style="font-size:12px;color:var(--text-muted)">Your data is safe and encrypted</div>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="rl-label">Driving License Number</label>
      <input type="text" class="rl-input" id="license-num" placeholder="TN XX XXXXXXXX XX">
    </div>

    <div class="form-group">
      <label class="rl-label">Vehicle Type</label>
      <select class="rl-select" id="vehicle-type">
        <option value="">Select vehicle type</option>
        <option>Scooter (Activa / Dio / Jupiter)</option>
        <option>Moped</option>
        <option>Motorcycle (100-150cc)</option>
        <option>Motorcycle (150cc+)</option>
      </select>
    </div>

    <div class="form-group">
      <label class="rl-label">Bike Number Plate</label>
      <input type="text" class="rl-input" id="bike-plate" placeholder="TN XX XX XXXX" style="text-transform:uppercase">
    </div>

    <div class="form-group">
      <label class="rl-label">Upload License Photo</label>
      <label for="license-photo" style="
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        gap:8px;padding:24px;
        border:2px dashed var(--dark-border);border-radius:var(--radius);
        cursor:pointer;transition:var(--transition);color:var(--text-muted);
        font-size:14px;
      " id="photo-label">
        <span style="font-size:32px">📄</span>
        <span>Tap to upload license photo</span>
        <span style="font-size:12px">JPG, PNG up to 5MB</span>
      </label>
      <input type="file" id="license-photo" accept="image/*" style="display:none" onchange="photoSelected(event)">
    </div>

    <div style="display:flex;align-items:flex-start;gap:10px;padding:14px;background:var(--dark-card);border-radius:var(--radius);margin-bottom:20px">
      <input type="checkbox" id="confirm-check" style="width:18px;height:18px;margin-top:2px;accent-color:var(--primary)">
      <label for="confirm-check" style="font-size:13px;color:var(--text-muted);cursor:pointer">
        I confirm that all the information provided is correct and my own. I understand that false information may result in account suspension.
      </label>
    </div>

    <button class="btn-primary-rl" onclick="submitVerification()">
      🔍 Submit Verification
    </button>

    <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--text-faint)">
      Demo: Verification is approved instantly for demonstration purposes.
    </div>
  </div>

</div>
</div>

<script src="js/app.js"></script>
<script>
  // Show verified state if already done
  if (loadState('verified', false)) {
    document.getElementById('verified-banner').style.display = 'block';
    document.getElementById('verified-banner').style.background = 'rgba(63,185,80,0.1)';
    document.getElementById('verified-banner').style.border = '1px solid rgba(63,185,80,0.3)';
    document.getElementById('verified-banner').style.borderRadius = '16px';
    document.getElementById('verified-banner').style.padding = '16px';
  }

  function photoSelected(e) {
    const label = document.getElementById('photo-label');
    const file  = e.target.files[0];
    if (file) {
      label.innerHTML = `<span style="font-size:32px">✅</span><span style="color:var(--success)">${file.name}</span>`;
      label.style.borderColor = 'var(--primary)';
    }
  }

  function submitVerification() {
    const license = document.getElementById('license-num').value.trim();
    const vehicle = document.getElementById('vehicle-type').value;
    const plate   = document.getElementById('bike-plate').value.trim();
    const confirm = document.getElementById('confirm-check').checked;

    if (!license || !vehicle || !plate) {
      showToast('Please fill all required fields', 'error'); return;
    }
    if (!confirm) {
      showToast('Please confirm your information', 'error'); return;
    }

    // Demo: immediately verify
    saveState('verified', true);
    showToast('✅ Verification approved!', 'success');

    setTimeout(() => {
      document.getElementById('verified-banner').style.display = 'block';
      document.getElementById('verified-banner').innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;color:var(--success)">
          <span style="font-size:24px">✅</span>
          <div>
            <div style="font-weight:700">You are now a Verified Driver!</div>
            <div style="font-size:13px;opacity:0.8">You can now offer rides on RideLink</div>
          </div>
        </div>`;
      document.getElementById('verified-banner').style.cssText += `
        display:block;background:rgba(63,185,80,0.1);
        border:1px solid rgba(63,185,80,0.3);border-radius:16px;
        padding:16px;margin-bottom:16px;`;
    }, 300);
  }
</script>
</body>
</html>
