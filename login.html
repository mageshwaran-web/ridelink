<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – RideLink</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">

  <!-- Hero -->
  <div class="login-hero">
    <div class="login-logo">R</div>
    <div class="login-headline">RideLink</div>
    <div class="login-sub">Community Bike Ride Sharing</div>

  </div>

  <!-- Form Section -->
  <div class="login-form-section">
    <!-- Tabs -->
    <div class="login-tab-group">
      <button class="login-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="login-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Login Form -->
    <div id="form-login">
      <div class="form-group">
        <label class="rl-label">Email</label>
        <div class="input-icon-wrap">
          <span class="input-icon">✉️</span>
          <input type="email" class="rl-input" id="login-email" placeholder="Enter your email" value="demo@ridelink.app">
        </div>
      </div>
      <div class="form-group">
        <label class="rl-label">Password</label>
        <div class="input-icon-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" class="rl-input" id="login-pass" placeholder="Enter password" value="demo123">
        </div>
      </div>
      <button class="btn-primary-rl" onclick="doLogin()" style="margin-top:8px">
        Login →
      </button>

      <div style="display:flex;align-items:center;gap:10px;margin:16px 0">
        <div style="flex:1;height:1px;background:var(--dark-border)"></div>
        <span style="font-size:12px;color:var(--text-faint)">or</span>
        <div style="flex:1;height:1px;background:var(--dark-border)"></div>
      </div>

      <button onclick="demoLogin()" style="
        width:100%;padding:13px;
        background:rgba(0,200,150,0.08);
        border:1.5px dashed rgba(0,200,150,0.45);
        color:var(--primary);border-radius:var(--radius);
        font-family:'DM Sans',sans-serif;font-size:14px;
        font-weight:600;cursor:pointer;letter-spacing:0.3px;
        transition:all 0.2s ease;display:flex;align-items:center;
        justify-content:center;gap:8px;"
        onmouseover="this.style.background='rgba(0,200,150,0.15)'"
        onmouseout="this.style.background='rgba(0,200,150,0.08)'">
        ⚡ Try Demo — No login needed
      </button>
    </div>

    <!-- Signup Form -->
    <div id="form-signup" style="display:none">
      <div class="form-group">
        <label class="rl-label">Full Name</label>
        <input type="text" class="rl-input" id="signup-name" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label class="rl-label">Phone Number</label>
        <input type="tel" class="rl-input" id="signup-phone" placeholder="10-digit phone">
      </div>
      <div class="form-group">
        <label class="rl-label">Email</label>
        <input type="email" class="rl-input" id="signup-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="rl-label">Password</label>
        <input type="password" class="rl-input" id="signup-pass" placeholder="Create a password">
      </div>
      <button class="btn-primary-rl" onclick="doSignup()" style="margin-top:8px">
        Create Account →
      </button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script>
  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('form-login').style.display  = tab === 'login'  ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
  }

  function demoLogin() {
    // Set demo user state and jump straight to dashboard
    const demoUser = { name: 'Demo User', phone: '9876543210', email: 'demo@ridelink.app', initial: 'D' };
    saveState('user', demoUser);
    saveState('verified', true);
    showToast('⚡ Demo mode — Welcome!', 'success');
    setTimeout(() => navigateTo('dashboard.html'), 700);
  }

  async function doLogin() {
    try {
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-pass').value;
      if (!email || !pass) { showToast('Complete all fields', 'error'); return; }

      if (!window.supabaseClient) {
        showToast('Database connection not established yet. Check js/supabase.js', 'error');
        return;
      }

      const { data, error } = await window.supabaseClient.auth.signInWithPassword({
        email: email,
        password: pass,
      });

      if (error) {
        showToast(error.message, 'error');
      } else if (data.session) {
        AppState.currentUser.email = data.user.email;
        saveState('user', AppState.currentUser);
        showToast('Welcome back! 👋', 'success');
        setTimeout(() => navigateTo('dashboard.html'), 800);
      }
    } catch (err) {
      alert('Login Error: ' + err.message);
    }
  }

  async function doSignup() {
    try {
      const name  = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const pass = document.getElementById('signup-pass').value;
      if (!name || !email || !pass) { showToast('Fill all required fields', 'error'); return; }

      if (!window.supabaseClient) {
        showToast('Database connection not established. Check js/supabase.js', 'error');
        return;
      }

      const { data, error } = await window.supabaseClient.auth.signUp({
        email: email,
        password: pass,
        options: {
          data: { full_name: name }
        }
      });

      if (error) {
        showToast(error.message, 'error');
      } else {
        AppState.currentUser.name    = name;
        AppState.currentUser.email   = email;
        AppState.currentUser.initial = name[0].toUpperCase();
        saveState('user', AppState.currentUser);
        showToast('Account created! 🎉', 'success');
        setTimeout(() => navigateTo('dashboard.html'), 1500);
      }
    } catch (err) {
      alert('Signup Error: ' + err.message);
    }
  }
</script>
</body>
</html>
