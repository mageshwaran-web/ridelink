<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offer Ride – RideLink</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css">
  <link rel="stylesheet" href="css/style.css">
  <style>.leaflet-routing-container { display:none !important; }</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand"><div class="nav-brand-icon">R</div>RideLink</div>
  <div class="nav-links">
    <a href="dashboard.html" data-nav="home">Home</a>
    <a href="navigate.html"  data-nav="navigate">Navigate</a>
    <a href="profile.html"   data-nav="profile">Profile</a>
  </div>
</nav>

<div class="page-wrapper">
<div class="desktop-layout">

  <div class="desktop-sidebar">
    <div class="page-header" style="padding:0 0 16px">
      <div class="back-btn" onclick="goBack()">←</div>
      <h1 class="page-title">Offer a Ride</h1>
    </div>

    <div class="rl-card fade-in" style="margin-bottom:16px">
      <p style="font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:6px;margin:0">
        <span>ℹ️</span>
        Click the map to set <b style="color:var(--primary)">pickup (A)</b> then <b style="color:var(--accent)">destination (B)</b>, or type below.
      </p>
    </div>

    <div class="fade-in">
      <div class="form-group">
        <label class="rl-label">Start Location</label>
        <div class="input-icon-wrap">
          <span class="input-icon">📍</span>
          <input type="text" class="rl-input" id="offer-pickup" placeholder="e.g. Gandhipuram" list="cbe-offer-start">
          <datalist id="cbe-offer-start">
            <option value="Gandhipuram"><option value="RS Puram"><option value="Peelamedu">
            <option value="Singanallur"><option value="Saibaba Colony"><option value="Ukkadam">
            <option value="Hopes College"><option value="Coimbatore Junction"><option value="Coimbatore Airport">
            <option value="Kovaipudur"><option value="Vadavalli"><option value="Kuniyamuthur">
            <option value="Podanur"><option value="Ondipudur"><option value="Ramanathapuram">
            <option value="Ganapathy"><option value="Perur"><option value="Pollachi">
            <option value="Mettupalayam"><option value="Tiruppur">
          </datalist>
        </div>
      </div>

      <div class="form-group">
        <label class="rl-label">Destination</label>
        <div class="input-icon-wrap">
          <span class="input-icon">🏁</span>
          <input type="text" class="rl-input" id="offer-dest" placeholder="e.g. Singanallur" list="cbe-offer-dest">
          <datalist id="cbe-offer-dest">
            <option value="Gandhipuram"><option value="RS Puram"><option value="Peelamedu">
            <option value="Singanallur"><option value="Saibaba Colony"><option value="Ukkadam">
            <option value="Hopes College"><option value="Coimbatore Junction"><option value="Coimbatore Airport">
            <option value="Kovaipudur"><option value="Vadavalli"><option value="Kuniyamuthur">
            <option value="Podanur"><option value="Ondipudur"><option value="Ramanathapuram">
            <option value="Ganapathy"><option value="Perur"><option value="Pollachi">
            <option value="Mettupalayam"><option value="Tiruppur">
          </datalist>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="rl-label">Departure Time</label>
          <input type="time" class="rl-input" id="offer-time" value="09:00">
        </div>
        <div class="form-group">
          <label class="rl-label">Price (₹)</label>
          <div class="input-icon-wrap">
            <span class="input-icon">₹</span>
            <input type="number" class="rl-input" id="offer-price" placeholder="e.g. 30" min="5" value="30">
          </div>
        </div>
      </div>

      <div id="route-info" style="display:none;margin-bottom:16px">
        <div class="rl-card">
          <div style="display:flex;gap:20px">
            <div>
              <div style="font-size:11px;color:var(--text-muted)">DISTANCE</div>
              <div style="font-weight:700;color:var(--primary)" id="offer-distance">--</div>
            </div>
            <div>
              <div style="font-size:11px;color:var(--text-muted)">EST. TIME</div>
              <div style="font-weight:700;color:var(--primary)" id="offer-eta">--</div>
            </div>
          </div>
        </div>
      </div>

      <button class="btn-primary-rl" onclick="postRide()">🚲 Post Ride</button>
    </div>
  </div>

  <div class="desktop-map" style="position:relative">
    <div id="offer-map" style="width:100%;height:100%"></div>
    <div class="map-overlay">
      <div class="map-info-chip" id="click-hint">👆 Click map: Set pickup point</div>
    </div>
  </div>

</div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="bottom-nav-item" data-nav="home"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
  <a href="navigate.html"  class="bottom-nav-item" data-nav="navigate"><span class="nav-icon">🗺️</span><span class="nav-label">Navigate</span></a>
  <a href="profile.html"   class="bottom-nav-item" data-nav="profile"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script src="js/map.js"></script>
<script>
  const CBE = [11.0168, 76.9558];
  let offerMap = initMap('offer-map', CBE, 13);
  let pickupCoords = null, destCoords = null;
  let pickupMarker, destMarker;
  let clickStep = 0;

  // Always use Coimbatore — ignore GPS to avoid wrong city
  offerMap.setView(CBE, 13);
  pickupCoords = CBE;

  // Animate pickup marker dropping in from above
  const dropStart = [CBE[0] + 0.08, CBE[1]];
  pickupMarker = L.marker(dropStart, { icon: icons.pickup })
    .addTo(offerMap).bindPopup('A – Pickup (Coimbatore)');

  let frame = 0;
  const FRAMES = 30;
  const dropTimer = setInterval(() => {
    frame++;
    const ease = 1 - Math.pow(1 - frame / FRAMES, 3);
    pickupMarker.setLatLng([dropStart[0] + (CBE[0] - dropStart[0]) * ease, CBE[1]]);
    if (frame >= FRAMES) {
      clearInterval(dropTimer);
      pickupMarker.setLatLng(CBE);
      pickupMarker.openPopup();
    }
  }, 20);

  document.getElementById('click-hint').innerHTML = '👆 Click map: Set destination';
  clickStep = 1;

  offerMap.on('click', e => {
    const latlng = [e.latlng.lat, e.latlng.lng];
    if (clickStep === 0) {
      if (pickupMarker) offerMap.removeLayer(pickupMarker);
      pickupCoords = latlng;
      pickupMarker = L.marker(latlng, { icon: icons.pickup }).addTo(offerMap).bindPopup('A – Pickup').openPopup();
      document.getElementById('click-hint').innerHTML = '👆 Click map: Set destination';
      clickStep = 1;
    } else {
      if (destMarker) offerMap.removeLayer(destMarker);
      destCoords = latlng;
      destMarker = L.marker(latlng, { icon: icons.dest }).addTo(offerMap).bindPopup('B – Destination').openPopup();
      document.getElementById('click-hint').innerHTML = '✅ Route set!';
      clickStep = 0;
      if (pickupCoords && destCoords) {
        const rc = L.Routing.control({
          waypoints: [L.latLng(pickupCoords), L.latLng(destCoords)],
          show: false, routeWhileDragging: false, showAlternatives: false,
          fitSelectedRoutes: true,
          lineOptions: { styles: [{ color:'#00C896', weight:5, opacity:0.85 }] },
          createMarker: () => null
        }).addTo(offerMap);
        rc.on('routesfound', e => {
          const s = e.routes[0].summary;
          document.getElementById('offer-distance').textContent = (s.totalDistance/1000).toFixed(1) + ' km';
          document.getElementById('offer-eta').textContent      = Math.round(s.totalTime/60) + ' min';
          document.getElementById('route-info').style.display   = 'block';
        });
      }
    }
  });

  async function postRide() {
    const pickup = document.getElementById('offer-pickup').value.trim();
    const dest   = document.getElementById('offer-dest').value.trim();
    const time   = document.getElementById('offer-time').value;
    const price  = document.getElementById('offer-price').value;
    if (!dest || !price) { showToast('Fill destination and price', 'error'); return; }

    try {
      if (window.supabaseClient) {
        await window.supabaseClient.from('rides').insert([{
           pickup: pickup || 'Your Location',
           destination: dest,
           time: time || 'Now',
           price: parseInt(price),
           driver: AppState.currentUser.name || 'Anonymous',
           driverInitial: AppState.currentUser.initial || 'A',
           rating: 5.0,
           rides: 0,
           verified: true
        }]);
      }
    } catch(e) {
      console.warn("Supabase insertion failed or not configured", e);
    }

    // Save posted ride to sessionStorage for driverWaiting page
    sessionStorage.setItem('postedRide', JSON.stringify({
      pickup:       pickup || 'Your Location',
      dest:         dest,
      time:         time || 'Now',
      price:        price,
      pickupCoords: pickupCoords || CBE,
      destCoords:   destCoords   || [CBE[0]+0.04, CBE[1]+0.04]
    }));

    showToast('🎉 Ride posted! Looking for passengers…', 'success');
    setTimeout(() => navigateTo('driverWaiting.html'), 900);
  }
</script>
</body>
</html>
