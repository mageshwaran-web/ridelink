<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Rides – RideLink</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand"><div class="nav-brand-icon">R</div>RideLink</div>
</nav>

<div class="page-wrapper">
<div style="max-width:600px;margin:0 auto;padding:16px">

  <div class="page-header" style="padding:0 0 20px">
    <div class="back-btn" onclick="goBack()">←</div>
    <h1 class="page-title">My Rides</h1>
  </div>

  <!-- Tabs -->
  <div class="rl-tabs">
    <button class="rl-tab active" id="tab-offered"   onclick="switchTab('offered')">🚲 Offered</button>
    <button class="rl-tab"        id="tab-requested" onclick="switchTab('requested')">🧍 Requested</button>
  </div>

  <div id="rides-container">
    <!-- JS populated -->
  </div>

</div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="bottom-nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Home</span></a>
  <a href="findRide.html"  class="bottom-nav-item active"><span class="nav-icon">🚲</span><span class="nav-label">Rides</span></a>
  <a href="navigate.html"  class="bottom-nav-item"><span class="nav-icon">🗺️</span><span class="nav-label">Navigate</span></a>
  <a href="profile.html"   class="bottom-nav-item"><span class="nav-icon">👤</span><span class="nav-label">Profile</span></a>
</nav>

<script src="js/app.js"></script>
<script src="js/rides.js"></script>
<script>
  let activeTab = 'offered';

  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tab-offered').classList.toggle('active',   tab === 'offered');
    document.getElementById('tab-requested').classList.toggle('active', tab === 'requested');
    renderMyRides(document.getElementById('rides-container'), tab);
  }

  renderMyRides(document.getElementById('rides-container'), 'offered');
</script>
</body>
</html>
